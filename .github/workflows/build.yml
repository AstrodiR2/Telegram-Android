name: Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.keystore

      - name: Set signing properties
        run: |
          sed -i "s/^RELEASE_KEY_PASSWORD=.*/RELEASE_KEY_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}/" gradle.properties
          sed -i "s/^RELEASE_KEY_ALIAS=.*/RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}/" gradle.properties
          sed -i "s/^RELEASE_STORE_PASSWORD=.*/RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}/" gradle.properties

      - name: Build APK
        run: ./gradlew :TMessagesProj_App:assembleStandalone --no-daemon -Pandroid.injected.build.abi=arm64-v8a

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegramMod-release
          path: "TMessagesProj_App/build/intermediates/apk/**/release/*.apk"
